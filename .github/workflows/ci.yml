name: CI

# Pipeline de CI/CD de Crono.
# Filosofía: 3 jobs claros, sin magia. quality + security son gates;
# deploy publica la versión nueva sobre la instancia ya aprovisionada.
#
# - quality  : lint (Pint) + tests (PHPUnit). Corre en push y en PR.
# - security : SCA de dependencias (composer audit + pnpm audit). Corre en push y en PR.
# - deploy   : git pull + rebuild Docker + migrate, vía SSH. SOLO en push a main,
#              y SOLO si quality y security pasaron. Arranca en modo manual (guard)
#              hasta que los GitHub Secrets estén cargados y validados.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permite disparar el deploy a mano desde la pestaña Actions mientras
  # se valida la configuración de Secrets (ver job deploy más abajo).
  workflow_dispatch:

# Cancela runs viejos del mismo ref si llega uno nuevo (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) CALIDAD — lint de estilo (Pint) + suite de tests (PHPUnit sobre SQLite).
  #    El phpunit.xml del repo ya fija DB_CONNECTION=sqlite / :memory:, así que
  #    no hace falta un service container: los tests corren tal como en local.
  # ---------------------------------------------------------------------------
  quality:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, gd, bcmath, intl, zip
          coverage: none
          tools: composer:v2

      - name: Cache de dependencias Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias (con dev, para Pint y PHPUnit)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar entorno de test
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint de estilo — Laravel Pint (modo check, no modifica)
        run: ./vendor/bin/pint --test

      - name: Tests — PHPUnit
        run: php artisan test

  # ---------------------------------------------------------------------------
  # 2) SEGURIDAD — Software Composition Analysis (SCA).
  #    Detecta dependencias con CVEs conocidos. composer audit (PHP) es el que
  #    más muerde en un Laravel; pnpm audit cubre el frontend.
  #    Overrides justificados van en SECURITY.md (sección "Overrides de audit").
  # ---------------------------------------------------------------------------
  security:
    name: SCA (audit de dependencias)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Auditar dependencias PHP — composer audit
        # SCA de PHP. --no-dev audita solo lo que llega a producción.
        # Las CVEs con override justificado (ver SECURITY.md → "Overrides de audit")
        # se ignoran vía --ignore para no bloquear, pero quedan documentadas y
        # con plan de remediación. El job SÍ falla ante cualquier advisory NUEVO.
        run: |
          composer audit --no-dev \
            --ignore=CVE-2026-48736 \
            --ignore=CVE-2026-46644 \
            --ignore=CVE-2026-48784

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Instalar deps JS (lockfile congelado, sin lifecycle scripts)
        # --frozen-lockfile = build reproducible (falla si el lock no concuerda).
        # --ignore-scripts = no ejecuta postinstall de terceros (anti supply-chain),
        # coherente con .npmrc del repo.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Auditar dependencias JS — pnpm audit (high+)
        run: pnpm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # 3) DEPLOY — publica la versión nueva sobre la instancia YA aprovisionada.
  #    NO re-aprovisiona (eso lo hace deploy/provision.sh una sola vez).
  #    Flujo Docker: git pull -> up -d --build -> migrate --force -> caches.
  #
  #    GUARD: hoy solo corre por disparo manual (workflow_dispatch). Para activar
  #    deploy automático en cada push a main, cambiar el `if` de abajo a:
  #        if: github.ref == 'refs/heads/main'
  #    (ver SECURITY.md → "Activar el deploy automático").
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy al hub (Docker)
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            echo "==> git pull"
            git pull --ff-only origin main
            echo "==> rebuild + up (el container corre el código COPY'd, no el del host)"
            docker compose -f docker-compose.prod.yml up -d --build
            echo "==> migrate (NUNCA migrate:fresh — hay marcajes reales)"
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            echo "==> caches de producción (config + route; NO view)"
            docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache
            echo "==> deploy OK"
