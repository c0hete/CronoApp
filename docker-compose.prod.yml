# =====================================================================
# Crono — compose de PRODUCCIÓN (hub, detrás de NPM)
# Uso en el server:  docker compose -f docker-compose.prod.yml up -d --build
#
# Diferencias clave con docker-compose.yml (dev):
#  - app = Apache (Dockerfile.prod), no nginx+php-fpm.
#  - mysql NO publica puertos al host (aislado en red interna; no choca con nada).
#  - app entra a nginx_network (external, de NPM) para que el proxy la alcance.
#  - datos de MySQL en volumen nombrado (persistente), igual que las DBs del hub.
# =====================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: crono-app
    container_name: crono_app
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - internal
      - nginx_network        # NPM le habla por HTTP a crono_app:80
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: crono_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crono}
      MYSQL_USER: ${DB_USERNAME:-crono}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - crono-db:/var/lib/mysql      # datos persistentes (sobreviven down/up/rebuild)
    networks:
      - internal                     # SIN ports al host: aislado, no choca con los 4 PG
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Scheduler: tareas programadas (purga de fotos / monitor de disco = Paso 9).
  # Hoy aún sin tareas reales; mantenerlo listo no molesta.
  scheduler:
    image: crono-app
    container_name: crono_scheduler
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    command: php artisan schedule:work

networks:
  internal:
    driver: bridge
  nginx_network:
    external: true        # YA existe en el hub (creada por NPM)

volumes:
  crono-db:
