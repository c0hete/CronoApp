# =====================================================================
# Crono — plantilla de despliegue (mismo compose en local Windows y server Ubuntu)
# Paridad: PHP 8.3 + MySQL 8, idéntico en ambos entornos.
# Datos y secretos NUNCA en la imagen: viven en volúmenes y en .env.
# =====================================================================

services:
  # --- App: PHP 8.3-FPM (Laravel) ---
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: crono-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  # --- Web: Nginx (sirve /public, proxy PHP a app:9000) ---
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # --- Base de datos: MySQL 8 (una por instancia) ---
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crono}
      MYSQL_USER: ${DB_USERNAME:-crono}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - crono-db:/var/lib/mysql
    # Puerto solo expuesto en local para inspección (host 3307 → evita choque con
    # MySQL nativo de Windows en 3306/33060). En prod se puede quitar este mapeo.
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Scheduler: corre las tareas programadas (purga fotos, monitor disco) ---
  scheduler:
    image: crono-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    command: php artisan schedule:work

volumes:
  crono-db:
    driver: local
